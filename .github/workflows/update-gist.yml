name: "Update Gist"

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install APT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libicu-dev zlib1g-dev libcurl4-openssl-dev libssl-dev ruby-dev

      - name: Install GitHub Linguist
        run: sudo gem install github-linguist

      - name: Install dependencies
        run: bun i

      - run: bun start
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ vars.GIST_ID }}
          USERNAME: ${{ github.actor }}

  # Re-enable this scheduled workflow on every run so GitHub does not disable it
  # after 60 days of repository inactivity.
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1.2.1
